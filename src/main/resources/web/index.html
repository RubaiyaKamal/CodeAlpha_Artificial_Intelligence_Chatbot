<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JavaBot – AI Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app" id="app">

  <!-- ═══════════════════════════ SIDEBAR ═══════════════════════════ -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-header">
      <div class="bot-avatar">
        <span>AI</span>
        <span class="avatar-ring"></span>
      </div>
      <div class="bot-meta">
        <h1 class="bot-name">JavaBot</h1>
        <div class="bot-status">
          <span class="dot-online"></span>Online
        </div>
      </div>
    </div>

    <div class="sidebar-scroll">
      <p class="section-label">Quick Topics</p>
      <div class="topics-list">
        <button class="topic-btn" onclick="quickAsk('What is artificial intelligence and how does it work?')">
          <span>🤖</span> AI &amp; Machine Learning
        </button>
        <button class="topic-btn" onclick="quickAsk('Tell me a funny programming joke')">
          <span>😄</span> Jokes
        </button>
        <button class="topic-btn" onclick="quickAsk('Explain Java programming and OOP concepts')">
          <span>💻</span> Programming
        </button>
        <button class="topic-btn" onclick="quickAsk('Recommend a great movie I should watch')">
          <span>🎬</span> Movies
        </button>
        <button class="topic-btn" onclick="quickAsk('What music genres should I explore?')">
          <span>🎵</span> Music
        </button>
        <button class="topic-btn" onclick="quickAsk('Share some exciting sports news')">
          <span>⚽</span> Sports
        </button>
        <button class="topic-btn" onclick="quickAsk('What are the biggest technology trends right now?')">
          <span>🚀</span> Technology
        </button>
        <button class="topic-btn" onclick="quickAsk('Tell me fascinating science and space facts')">
          <span>🔬</span> Science &amp; Space
        </button>
        <button class="topic-btn" onclick="quickAsk('What healthy food should I eat today?')">
          <span>🍕</span> Food &amp; Recipes
        </button>
        <button class="topic-btn" onclick="quickAsk('25 * 4 + 10')">
          <span>🔢</span> Math (25 × 4 + 10)
        </button>
        <button class="topic-btn" onclick="quickAsk('What time is it right now?')">
          <span>🕐</span> Current Time
        </button>
        <button class="topic-btn" onclick="quickAsk('What is todays date?')">
          <span>📅</span> Today's Date
        </button>
      </div>
    </div>

    <div class="sidebar-footer">
      <button class="btn-clear" onclick="clearChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
        Clear Chat
      </button>
      <div class="powered-label">Java · TF-IDF · NLP</div>
    </div>

  </aside>

  <!-- ═══════════════════════════ MAIN ═══════════════════════════════ -->
  <main class="chat-main">

    <!-- Top header bar -->
    <header class="chat-header">
      <button class="burger-btn" onclick="toggleSidebar()" aria-label="Menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="3" y1="6"  x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>

      <div class="header-identity">
        <div class="header-avatar">AI</div>
        <div>
          <div class="header-name">JavaBot</div>
          <div class="header-sub"><span class="dot-online sm"></span>Online · NLP Powered</div>
        </div>
      </div>

      <button class="btn-header-clear" onclick="clearChat()">Clear</button>
    </header>

    <!-- Message feed -->
    <div class="messages" id="messages"></div>

    <!-- Input bar -->
    <div class="input-area">
      <div class="input-box" id="inputBox">
        <textarea
          id="userInput"
          placeholder="Message JavaBot…"
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <p class="input-hint">
        <kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for new line
      </p>
    </div>

  </main>

  <!-- Mobile overlay (closes sidebar) -->
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

</div>

<script src="app.js"></script>
</body>
</html>
